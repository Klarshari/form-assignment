<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Sign Up Form</title>
</head>
<body>

  <h1>Event Sign Up</h1>
  <p>Please fill out the form below.</p>

  <form action="#" method="post">

    <!-- Text inputs (at least 2) -->
    <label for="firstName">First Name:</label>
    <input type="text" id="firstName" name="firstName">
    <br><br>

    <label for="lastName">Last Name:</label>
    <input type="text" id="lastName" name="lastName">
    <br><br>

    <!-- Email input (required) -->
    <label for="email">Email (required):</label>
    <input type="email" id="email" name="email" required>
    <br><br>

    <!-- Tel input (required) -->
    <label for="phone">Phone Number (required):</label>
    <input type="tel" id="phone" name="phone" required>
    <br><br>

    <!-- Radio buttons (2 or more) -->
    <p>Which session are you attending?</p>
    <input type="radio" id="morning" name="session" value="morning">
    <label for="morning">Morning</label>
    <br>

    <input type="radio" id="afternoon" name="session" value="afternoon">
    <label for="afternoon">Afternoon</label>
    <br><br>

    <!-- Checkboxes -->
    <p>What are you interested in? (check all that apply)</p>
    <input type="checkbox" id="workshop" name="interest" value="workshop">
    <label for="workshop">Workshop</label>
    <br>

    <input type="checkbox" id="vendors" name="interest" value="vendors">
    <label for="vendors">Vendors</label>
    <br>

    <input type="checkbox" id="networking" name="interest" value="networking">
    <label for="networking">Networking</label>
    <br><br>

    <!-- Dropdown with at least 3 options -->
    <label for="shirtSize">T-Shirt Size:</label>
    <select id="shirtSize" name="shirtSize">
      <option value="small">Small</option>
      <option value="medium">Medium</option>
      <option value="large">Large</option>
    </select>
    <br><br>

    <!-- Textarea -->
    <label for="comments">Comments / Questions:</label>
    <br>
    <textarea id="comments" name="comments" rows="4" cols="40"></textarea>
    <br><br>

    <!-- Submit button -->
    <input type="submit" value="Submit">

  </form>

</body>
</html>
